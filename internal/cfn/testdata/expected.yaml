            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-medium
        - - Name: runner
            Image: !Ref RunnerImage
            Essential: true
            Command: ["/home/runner/run.sh"]
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-medium
      Tags:
        - Key: "ecs-arc:max-runners"
          Value: !Ref RunnerMediumMaxRunners
        - Key: "ecs-arc:min-runners"
          Value: !Ref RunnerMediumMinRunners
        - Key: "ecs-arc:max-runtime"
          Value: "6h"

  RunnerLargeTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-runner-large"
      Cpu: !Ref RunnerLargeCpu
      Memory: !Ref RunnerLargeMemory
      NetworkMode: !If [UseExternal, bridge, awsvpc]
      RequiresCompatibilities:
        - !If [UseManagedInstances, EC2, !If [UseFargateSpot, FARGATE, EXTERNAL]]
      RuntimePlatform:
