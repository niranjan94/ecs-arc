AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  ECS Actions Runner Controller (ecs-arc) - Deploys a controller service that
  autoscales GitHub Actions self-hosted runners as ECS tasks.

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Environment name used as a prefix for all resources

  GitHubAppClientId:
    Type: String
    Description: GitHub App Client ID (e.g. Iv1.abc123)

  GitHubAppInstallationId:
    Type: String
    Description: GitHub App Installation ID

  GitHubAppPrivateKeyArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the GitHub App private key

  GitHubOrg:
    Type: String
    Description: GitHub organization name

  ControllerImageUri:
    Type: String
    Default: "ghcr.io/niranjan94/ecs-arc:latest"
    Description: Container image URI for the ecs-arc controller

  PrivateSubnetIds:
    Type: String
    Default: ""
    Description: Private subnet IDs for ECS tasks, comma-separated (required for FARGATE_SPOT and MANAGED_INSTANCES)

  ServiceSecurityGroupId:
    Type: String
    Default: ""
    Description: Security group ID for ECS tasks (required for FARGATE_SPOT and MANAGED_INSTANCES)

  EcsLaunchType:
    Type: String
    Default: FARGATE_SPOT
    AllowedValues: [MANAGED_INSTANCES, EXTERNAL, FARGATE_SPOT]
    Description: >-
      Launch type for runner tasks. MANAGED_INSTANCES uses EC2 with a capacity
      provider. EXTERNAL uses ECS Anywhere. FARGATE_SPOT uses Fargate Spot.

  ExistingClusterName:
    Type: String
    Default: ""
    Description: Name of an existing ECS cluster. Leave empty to create a new one.

  RunnerSmallCpu:
    Type: String
    Default: "1024"
    Description: CPU units for small runner tasks (1024 = 1 vCPU)

  RunnerSmallMemory:
    Type: String
    Default: "2048"
    Description: Memory (MiB) for small runner tasks

  RunnerMediumCpu:
    Type: String
    Default: "2048"
    Description: CPU units for medium runner tasks (2048 = 2 vCPU)

  RunnerMediumMemory:
    Type: String
    Default: "4096"
    Description: Memory (MiB) for medium runner tasks

  RunnerLargeCpu:
    Type: String
    Default: "4096"
    Description: CPU units for large runner tasks (4096 = 4 vCPU)

  RunnerLargeMemory:
    Type: String
    Default: "8192"
    Description: Memory (MiB) for large runner tasks

  RunnerSmallMaxRunners:
    Type: String
    Default: "10"
    Description: Maximum concurrent runners for small task definitions

  RunnerSmallMinRunners:
    Type: String
    Default: "0"
    Description: Minimum idle runners for small task definitions

  RunnerMediumMaxRunners:
    Type: String
    Default: "10"
    Description: Maximum concurrent runners for medium task definitions

  RunnerMediumMinRunners:
    Type: String
    Default: "0"
    Description: Minimum idle runners for medium task definitions

  RunnerLargeMaxRunners:
    Type: String
    Default: "5"
    Description: Maximum concurrent runners for large task definitions

  RunnerLargeMinRunners:
    Type: String
    Default: "0"
    Description: Minimum idle runners for large task definitions

  RunnerExtraLabels:
    Type: String
    Default: ""
    Description: >-
      Additional GitHub Actions labels to apply to all runner scale sets,
      comma-separated (e.g. "self-hosted,custom-label"). OS and architecture
      labels are added automatically from the task definition's RuntimePlatform.

  RunnerImage:
    Type: String
    Default: "ghcr.io/actions/actions-runner:latest"
    Description: Container image URI for the GitHub Actions runner

  DindImage:
    Type: String
    Default: "docker:dind"
    Description: Container image URI for the Docker-in-Docker sidecar

Conditions:
  UseManagedInstances: !Equals [!Ref EcsLaunchType, MANAGED_INSTANCES]
  UseFargateSpot: !Equals [!Ref EcsLaunchType, FARGATE_SPOT]
  UseExternal: !Equals [!Ref EcsLaunchType, EXTERNAL]
  CreateCluster: !Equals [!Ref ExistingClusterName, ""]
  HasRunnerExtraLabels: !Not [!Equals [!Ref RunnerExtraLabels, ""]]
  EnableDind: !Not [!Equals [!Ref EcsLaunchType, FARGATE_SPOT]]

Resources:
  # --- ECS Cluster ---
  EcsCluster:
    Type: AWS::ECS::Cluster
    Condition: CreateCluster
    Properties:
      ClusterName: !Sub "${Environment}-ecs-arc"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: ecs-arc
        - Key: Environment
          Value: !Ref Environment

  # --- CloudWatch Log Groups ---
  ControllerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Environment}-ecs-arc/controller"
      RetentionInDays: 30

  RunnerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Environment}-ecs-arc/runners"
      RetentionInDays: 14

  # --- IAM Roles ---
  ControllerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ecs-arc-controller-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref GitHubAppPrivateKeyArn

  ControllerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ecs-arc-controller-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EcsRunnerManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:TagResource
                Resource: "*"
                Condition:
                  ArnEquals:
                    ecs:cluster: !If
                      - CreateCluster
                      - !GetAtt EcsCluster.Arn
                      - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${ExistingClusterName}"
              - Effect: Allow
                Action:
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt RunnerExecutionRole.Arn
                  - !GetAtt RunnerTaskRole.Arn

  RunnerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ecs-arc-runner-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"

  RunnerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ecs-arc-runner-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # Add workflow-specific permissions here

  # --- Controller Task Definition ---
  ControllerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-ecs-arc-controller"
      Cpu: "256"
      Memory: "512"
      NetworkMode: !If [UseExternal, bridge, awsvpc]
      RequiresCompatibilities:
        - !If [UseExternal, EXTERNAL, FARGATE]
      RuntimePlatform:
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ControllerExecutionRole.Arn
      TaskRoleArn: !GetAtt ControllerTaskRole.Arn
      ContainerDefinitions:
        - Name: controller
          Image: !Ref ControllerImageUri
          Essential: true
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: GITHUB_APP_CLIENT_ID
              Value: !Ref GitHubAppClientId
            - Name: GITHUB_APP_INSTALLATION_ID
              Value: !Ref GitHubAppInstallationId
            - Name: GITHUB_ORG
              Value: !Ref GitHubOrg
            - Name: ECS_CLUSTER
              Value: !If
                - CreateCluster
                - !Ref EcsCluster
                - !Ref ExistingClusterName
            - !If
              - UseExternal
              - !Ref "AWS::NoValue"
              - Name: ECS_SUBNETS
                Value: !Ref PrivateSubnetIds
            - !If
              - UseExternal
              - !Ref "AWS::NoValue"
              - Name: ECS_SECURITY_GROUPS
                Value: !Ref ServiceSecurityGroupId
            - Name: TASK_DEFINITIONS
              Value: !Sub >-
                ${Environment}-runner-small,${Environment}-runner-medium,${Environment}-runner-large,${Environment}-runner-small-x64,${Environment}-runner-medium-x64,${Environment}-runner-large-x64,${Environment}-runner-small-arm64,${Environment}-runner-medium-arm64,${Environment}-runner-large-arm64
            - !If
              - HasRunnerExtraLabels
              - Name: RUNNER_EXTRA_LABELS
                Value: !Ref RunnerExtraLabels
              - !Ref "AWS::NoValue"
          Secrets:
            - Name: GITHUB_APP_PRIVATE_KEY
              ValueFrom: !Ref GitHubAppPrivateKeyArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ControllerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: controller

  # --- Controller Service ---
  ControllerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${Environment}-ecs-arc-controller"
      Cluster: !If
        - CreateCluster
        - !Ref EcsCluster
        - !Ref ExistingClusterName
      TaskDefinition: !Ref ControllerTaskDefinition
      DesiredCount: 1
      LaunchType: !If [UseExternal, EXTERNAL, FARGATE]
      NetworkConfiguration: !If
        - UseExternal
        - !Ref "AWS::NoValue"
        - AwsvpcConfiguration:
            Subnets: !Split [",", !Ref PrivateSubnetIds]
            SecurityGroups:
              - !Ref ServiceSecurityGroupId
            AssignPublicIp: DISABLED
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0

  # --- Runner Task Definitions ---
  RunnerSmallTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-runner-small"
      Cpu: !Ref RunnerSmallCpu
      Memory: !Ref RunnerSmallMemory
      NetworkMode: !If [UseExternal, bridge, awsvpc]
      RequiresCompatibilities:
        - !If [UseManagedInstances, EC2, !If [UseFargateSpot, FARGATE, EXTERNAL]]
      RuntimePlatform:
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt RunnerExecutionRole.Arn
      TaskRoleArn: !GetAtt RunnerTaskRole.Arn
      Volumes: !If
        - EnableDind
        - - Name: dind-sock
          - Name: dind-externals
          - Name: work
        - !Ref "AWS::NoValue"
      ContainerDefinitions: !If
        - EnableDind
        - - Name: init-dind-externals
            Image: !Ref RunnerImage
            Essential: false
            User: "0"
            Command: ["sh", "-c", "cp -a /home/runner/externals/. /home/runner/tmpDir/ && chown -R 1001:123 /home/runner/tmpDir /home/runner/_work"]
            MountPoints:
              - SourceVolume: dind-externals
                ContainerPath: /home/runner/tmpDir
              - SourceVolume: work
                ContainerPath: /home/runner/_work
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-small-init
          - Name: dind
            Image: !Ref DindImage
            Essential: true
            Privileged: true
            Command: ["dockerd", "--host=unix:///var/run/docker.sock", "--group=123"]
            HealthCheck:
              Command: ["CMD", "docker", "info"]
              StartPeriod: 120
              Interval: 5
              Timeout: 5
              Retries: 3
            MountPoints:
              - SourceVolume: work
                ContainerPath: /home/runner/_work
              - SourceVolume: dind-sock
                ContainerPath: /var/run
              - SourceVolume: dind-externals
                ContainerPath: /home/runner/externals
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-small-dind
          - Name: runner
            Image: !Ref RunnerImage
            Essential: true
            Command: ["/home/runner/run.sh"]
            Environment:
              - Name: DOCKER_HOST
                Value: unix:///var/run/docker.sock
              - Name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                Value: "120"
            DependsOn:
              - ContainerName: init-dind-externals
                Condition: SUCCESS
              - ContainerName: dind
                Condition: HEALTHY
            MountPoints:
              - SourceVolume: work
                ContainerPath: /home/runner/_work
              - SourceVolume: dind-sock
                ContainerPath: /var/run
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-small
        - - Name: runner
            Image: !Ref RunnerImage
            Essential: true
            Command: ["/home/runner/run.sh"]
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-small
      Tags:
        - Key: "ecs-arc:max-runners"
          Value: !Ref RunnerSmallMaxRunners
        - Key: "ecs-arc:min-runners"
          Value: !Ref RunnerSmallMinRunners
        - Key: "ecs-arc:max-runtime"
          Value: "6h"

  RunnerMediumTaskDefinition:
