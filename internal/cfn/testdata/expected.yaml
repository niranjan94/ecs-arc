                ContainerPath: /home/runner/_work
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref RunnerLogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: runner-medium-init
          - Name: dind
            Image: !Ref DindImage
            Essential: true
            Privileged: true
            Command: ["dockerd", "--host=unix:///var/run/docker.sock", "--group=123"]
            HealthCheck:
              Command: ["CMD", "docker", "info"]
